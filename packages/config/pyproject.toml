[project]
name = "internum-config"
version = "0.1.0"
description = "Shared configuration floor for Internum Core"
requires-python = ">=3.12"
dependencies = [
    "pydantic-settings>=2.10.0",
]

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/internum_config"]

[tool.ruff]
extend = "ruff.toml"
