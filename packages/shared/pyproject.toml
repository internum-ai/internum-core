[project]
name = "internum-shared"
version = "0.1.0"
description = "Framework-agnostic shared utilities for Internum Core"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/internum_shared"]

[tool.ruff]
extend = "../config/ruff.toml"
